<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CommUnity – Find your community{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% if has_built_css %}
  <link rel="stylesheet" href="/static/css/app.css">
  {% else %}
  <script src="https://cdn.tailwindcss.com"></script>
  {% endif %}
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-900">

<header class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-20">
  <div class="max-w-5xl mx-auto px-6 py-3.5 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 font-bold text-indigo-600 text-xl tracking-tight">
      🌐 CommUnity
    </a>
    <nav class="flex items-center gap-1">
      <a href="/" class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">Discover</a>
      <a href="/map" class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">Map</a>
      <a href="/about" class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">About</a>
    </nav>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="mt-20 border-t border-gray-100 bg-white py-8">
  <div class="max-w-5xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-3">
    <div class="flex items-center gap-2">
      <span class="font-semibold text-indigo-600 text-sm">🌐 CommUnity</span>
      <span class="text-xs text-gray-400">· Communities discovered from public web data</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="/about" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">About</a>
      <a href="/map" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Map</a>
      <a href="/admin" class="text-xs text-gray-300 hover:text-gray-500 transition-colors">Admin</a>
    </div>
  </div>
</footer>

</body>
</html>
