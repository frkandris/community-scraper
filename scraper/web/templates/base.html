<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Community Scraper{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css" onerror="this.remove()">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased">

<nav class="bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
    <a href="/admin" class="font-bold text-gray-900 text-sm">🕷 Admin</a>
    <a href="/admin" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
    <a href="/admin/results" class="text-sm text-gray-600 hover:text-gray-900">Results</a>
    <a href="/admin/cache" class="text-sm text-gray-600 hover:text-gray-900">Cache</a>
    <a href="/admin/config" class="text-sm text-gray-600 hover:text-gray-900">Config</a>
    <a href="/admin/logs" class="text-sm text-gray-600 hover:text-gray-900">Logs</a>
    <a href="/admin/history" class="text-sm text-gray-600 hover:text-gray-900">History</a>
    <a href="/admin/subscriptions" class="text-sm text-gray-600 hover:text-gray-900">Subscribers</a>
    <a href="/" class="text-sm text-indigo-500 hover:text-indigo-700 ml-2">← Public site</a>
    <span class="ml-auto text-xs text-gray-400 font-mono">{{ app_version }}</span>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8">
  {% block content %}{% endblock %}
</main>

</body>
</html>
